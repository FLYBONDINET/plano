<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<title>SAEZCONTROL – TRFC</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<header class="topbar">
  <div class="brand">🗼 SAEZCONTROL – TRFC</div>

  <div class="filters">
    <button class="chip active">ALL</button>
  </div>

  <div class="actions">
    <button id="btnRefresh">🔄</button>
    <button id="btnEditor">🛠</button>
  </div>
</header>

<div class="layout">
  <aside class="sidebar">
    <h3>Aeronaves</h3>
    <div id="flightList"></div>
  </aside>
  <main id="map"></main>
</div>

<div id="cardLayer"></div>

<!-- MODO EDITOR -->
<div id="editorOverlay" class="editor hidden">
  <div class="editor-panel">
    <h3>Modo editor</h3>
    <button id="edAddPos">➕ Crear posición</button>
    <button id="edExit" class="danger">🚪 Salir</button>
  </div>
</div>

<!-- MODAL POSICIÓN -->
<div id="posModal" class="modal hidden">
  <div class="modal-box">
    <h3>Nueva posición</h3>

    <label>Nombre</label>
    <input id="posName"/>

    <label>Color</label>
    <input type="color" id="posColor" value="#ffffff"/>

    <label>Heading</label>
    <input type="range" id="posHdg" min="0" max="360"/>

    <div id="posPreview">✈️</div>

    <div class="modal-actions">
      <button id="posCancel">Cancelar</button>
      <button id="posOk" class="primary">Guardar</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
window.API_URL = "https://script.google.com/macros/s/AKfycby3Z0nE_k19J4RQFgANnFHIRd-3_5vW8vSLAeCnhsfvligH9jmmmuYiVmRDuqCc6QCA/exec";
</script>

<script src="js/app.js"></script>
</body>
</html>
