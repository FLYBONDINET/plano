<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <title>SAEZCONTROL – TRFC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<header class="topbar">
  <div class="brand">🗼 SAEZCONTROL – TRFC</div>

  <div class="filters">
    <button class="chip active" data-filter="ALL">ALL</button>
    <button class="chip" data-filter="ARR">ARR</button>
    <button class="chip" data-filter="TRN">TRN</button>
    <button class="chip" data-filter="MX">MX</button>
    <button class="chip" data-filter="NS">NS</button>
    <button class="chip" data-filter="DEP">DEP</button>
  </div>

  <div class="actions">
    <button id="btnRefresh" title="Refrescar">🔄</button>
    <button id="btnReplay" title="Replay">▶</button>
    <button id="btnStop" title="Stop">⏹</button>
    <button id="btnNight" title="Noche">🌙</button>
    <button id="btnEditor" title="Editor">🛠</button>
  </div>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="sidehead">
      <h3>Aeronaves</h3>
      <div class="small muted" id="statusLine">—</div>
    </div>
    <div id="flightList"></div>

    <div class="sidefooter">
      <button id="btnExportLog" class="ghost">Export log</button>
      <button id="btnExportSnap" class="ghost">Export replay</button>
    </div>
  </aside>

  <main id="mapWrap">
    <div id="map"></div>
    <div id="darkOverlay"></div>
  </main>
</div>

<!-- Capa tarjetas -->
<div id="cardLayer"></div>

<!-- Timeline -->
<div id="timelinePanel" class="timeline hidden">
  <div class="timeline-head">
    <b>Replay del turno</b>
    <div class="row">
      <button id="btnCloseTimeline" class="ghost">✖</button>
    </div>
  </div>
  <input id="timelineRange" type="range" min="0" max="0" value="0"/>
  <div id="timelineLabel" class="timeline-label">—</div>
</div>

<!-- EDITOR OVERLAY -->
<div id="editorOverlay" class="editor hidden">
  <div class="editor-panel">
    <div class="editor-title">
      <b>Modo editor</b>
      <button id="edExit" class="ghost">✖</button>
    </div>

    <div class="editor-section">
      <button id="edAddPos">➕ Crear posición</button>
      <button id="edEditPos">✏️ Editar posición</button>
      <button id="edDelPos" class="danger">🗑 Eliminar posición</button>
    </div>

    <div class="editor-section">
      <button id="edLines">🗺 Líneas aeropuerto</button>
      <div class="lineTools hidden" id="lineTools">
        <label class="small muted">Color línea</label>
        <input type="color" id="lineColor" value="#ffffff"/>
        <label class="small muted">Grosor</label>
        <input type="range" id="lineWidth" min="1" max="10" value="3"/>
        <div class="row">
          <button id="lineUndo">↩ Deshacer</button>
          <button id="lineClear" class="danger">🧹 Borrar</button>
        </div>
      </div>
    </div>

    <div class="editor-section">
      <button id="edExportPos">⬇ Export posiciones</button>
      <button id="edImportPos">⬆ Import posiciones</button>
      <input id="importFile" type="file" accept="application/json" class="hidden"/>
    </div>

    <div class="editor-section">
      <label class="small muted">Oscurecer fondo</label>
      <input id="darkRange" type="range" min="0" max="70" value="35"/>
    </div>
  </div>
</div>

<!-- MODAL POSICIÓN -->
<div id="posModal" class="modal hidden">
  <div class="modal-box">
    <h3 id="posModalTitle">Posición</h3>

    <label>Nombre</label>
    <input id="posName" placeholder="14B / 52A"/>

    <div class="grid2">
      <div>
        <label>Color punto</label>
        <input type="color" id="posColor" value="#ffffff"/>
      </div>
      <div>
        <label>Estado label</label>
        <select id="posLabelSide">
          <option value="right">Derecha</option>
          <option value="left">Izquierda</option>
          <option value="top">Arriba</option>
          <option value="bottom">Abajo</option>
        </select>
      </div>
    </div>

    <label>Heading (HDG)</label>
    <input type="range" id="posHdg" min="0" max="360" value="0"/>
    <div class="small muted" id="posHdgVal">0°</div>

    <div id="posPreview" class="previewBox">
      <div id="posPreviewIcon" style="transform:rotate(0deg)">✈️</div>
    </div>

    <div class="row">
      <button id="posCancel">Cancelar</button>
      <button id="posOk" class="primary">Guardar</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
  // API
  window.API_URL = "https://script.google.com/macros/s/AKfycby3Z0nE_k19J4RQFgANnFHIRd-3_5vW8vSLAeCnhsfvligH9jmmmuYiVmRDuqCc6QCA/exec";
</script>

<script src="js/app.js"></script>
</body>
</html>
